<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>School — PIR Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="school-page.css" />
</head>
<body class="school-body">
  <header class="header">
    <div class="header-text">
      <h1>Program Implementation Review</h1>
      <p>Schools Division of Oroquieta City · Misamis Occidental</p>
    </div>
    <a href="index.html" class="back-link">← Back to Map</a>
  </header>

  <main class="school-main">
    <div class="school-decor" aria-hidden="true">
      <span class="decor-icon decor-icon--1">📚</span>
      <span class="decor-icon decor-icon--2">✏️</span>
      <span class="decor-icon decor-icon--3">📝</span>
      <span class="decor-icon decor-icon--4">🎓</span>
      <span class="decor-icon decor-icon--5">📖</span>
      <span class="decor-icon decor-icon--6">✒️</span>
      <span class="decor-icon decor-icon--7">📐</span>
      <span class="decor-icon decor-icon--8">🏫</span>
    </div>

    <div class="welcome-card">
      <p class="welcome-label">Welcome to</p>
      <h2 id="school-name" class="welcome-title">School</h2>
      <div id="school-heads" class="school-heads"></div>
    </div>

    <div id="action-buttons" class="action-buttons"></div>
  </main>

  <footer class="footer">
    <p>Department of Education — Schools Division of Oroquieta City, Misamis Occidental, Philippines</p>
  </footer>

  <script src="data.js"></script>
  <script src="school.js"></script>

</html>
